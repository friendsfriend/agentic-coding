[models]
manager = "opencode/deepseek-v4-flash-free"
triage = "opencode/deepseek-v4-flash-free"
recovery = "openai-codex/gpt-5.6-luna"
planner = "openai-codex/gpt-5.6-sol"
worker_default = "github-copilot/kimi-k2.7-code"
worker_alternative = "openai-codex/gpt-5.6-luna"
verifier = "github-copilot/claude-sonnet-5"
security_verifier = "github-copilot/claude-sonnet-5"
quality_verifier = "github-copilot/claude-sonnet-5"
performance_verifier = "github-copilot/claude-sonnet-5"
test_verifier = "github-copilot/claude-sonnet-5"
agents_verifier = "opencode/deepseek-v4-flash-free"
openspec_verifier = "opencode/deepseek-v4-flash-free"
verifier_fallback = "github-copilot/kimi-k2.7-code"
archive = "github-copilot/kimi-k2.7-code"

[thinking]
manager = "low"
triage = "low"
recovery = "low"
verifier_lite = "low"
planner = "high"
worker_default = "low"
verifier = "high"
archive = "low"

[workflow]
max_verification_rounds = 6
verification_timeout_seconds = 600
remote = "origin"
branch_prefix = "feature/"
base_branch = "origin/HEAD"
worktree_directory = "~/.herdr/worktrees"

[projects]
root = "~/development"
max_depth = 3

[ui]
theme = "catppuccin"
selection_height = 10
