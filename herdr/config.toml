onboarding = false

[terminal]
shell_mode = "auto"
new_cwd = "follow"

[worktrees]
directory = "~/.herdr/worktrees"

[keys]
prefix = "ctrl+g"
goto = "prefix+shift+g"
edit_scrollback = "prefix+shift+e"

[ui]
confirm_close = true
prompt_new_tab_name = true
agent_panel_sort = "spaces"

show_agent_labels_on_pane_borders = true
[ui.toast]
delivery = "herdr"
delay_seconds = 1

[session]
resume_agents_on_restore = true

[experimental]
allow_nested = false
pane_history = false

[ui.sound]
enabled = false

[[keys.command]]
key = "prefix+g"
type = "popup"
command = "lazygit"
width = "80%"
height = "80%"

[[keys.command]]
key = "prefix+e"
type = "popup"
command = "nvim"
width = "80%"
height = "80%"
